<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470" font-family="'DM Sans', system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-labelledby="parallel-title parallel-desc">
  <title id="parallel-title">GGX parallel monitoring execution</title>
  <desc id="parallel-desc">GGX partitions the monitoring workload, distributes partitions to worker threads on multiple machines, runs four or five LLM judges concurrently for each conversation, and combines the results for assignment.</desc>
  <defs>
    <marker id="parallel-arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1 1L7 4.5L1 8" fill="none" stroke="#5b6a96" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1120" height="470" rx="18" fill="#ffffff"/>
  <text x="560" y="31" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="1.4" fill="#6b7280">PARTITION · DISTRIBUTE · FAN OUT · ASSIGN</text>

  <!-- Work queue -->
  <rect x="35" y="118" width="190" height="206" rx="16" fill="#eef1f6" stroke="#5b6a96"/>
  <text x="130" y="151" text-anchor="middle" font-size="15" font-weight="700" fill="#293147">Conversation queue</text>
  <text x="130" y="174" text-anchor="middle" font-size="11.5" fill="#5b6a96">~350K judge-eligible</text>
  <g transform="translate(74 197)">
    <rect x="0" y="0" width="112" height="24" rx="5" fill="#ffffff" stroke="#c3ccdf"/>
    <rect x="8" y="7" width="58" height="4" rx="2" fill="#9aa6c0"/>
    <rect x="8" y="14" width="82" height="4" rx="2" fill="#d7dcec"/>
    <rect x="0" y="32" width="112" height="24" rx="5" fill="#ffffff" stroke="#c3ccdf"/>
    <rect x="8" y="39" width="72" height="4" rx="2" fill="#9aa6c0"/>
    <rect x="8" y="46" width="46" height="4" rx="2" fill="#d7dcec"/>
    <rect x="0" y="64" width="112" height="24" rx="5" fill="#ffffff" stroke="#c3ccdf"/>
    <rect x="8" y="71" width="84" height="4" rx="2" fill="#9aa6c0"/>
    <rect x="8" y="78" width="64" height="4" rx="2" fill="#d7dcec"/>
  </g>
  <text x="130" y="299" text-anchor="middle" font-size="11.5" font-weight="600" fill="#293147">Partitioned by agent,</text>
  <text x="130" y="314" text-anchor="middle" font-size="11.5" font-weight="600" fill="#293147">tenant, time, or chat</text>

  <line x1="237" y1="221" x2="280" y2="221" stroke="#5b6a96" stroke-width="2" marker-end="url(#parallel-arrow)"/>

  <!-- Worker machines -->
  <rect x="296" y="63" width="330" height="140" rx="16" fill="#ffffff" stroke="#293147" stroke-width="1.5"/>
  <text x="320" y="91" font-size="14" font-weight="700" fill="#293147">Worker machine A</text>
  <text x="600" y="91" text-anchor="end" font-size="11" font-weight="600" fill="#5b6a96">scale up</text>
  <g transform="translate(320 111)">
    <rect x="0" y="0" width="66" height="58" rx="8" fill="#eef1f6" stroke="#c3ccdf"/>
    <rect x="76" y="0" width="66" height="58" rx="8" fill="#eef1f6" stroke="#c3ccdf"/>
    <rect x="152" y="0" width="66" height="58" rx="8" fill="#eef1f6" stroke="#c3ccdf"/>
    <rect x="228" y="0" width="66" height="58" rx="8" fill="#eef1f6" stroke="#c3ccdf"/>
    <text x="33" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#293147">Thread</text>
    <text x="33" y="41" text-anchor="middle" font-size="13" font-weight="700" fill="#5b6a96">01</text>
    <text x="109" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#293147">Thread</text>
    <text x="109" y="41" text-anchor="middle" font-size="13" font-weight="700" fill="#5b6a96">02</text>
    <text x="185" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#293147">Thread</text>
    <text x="185" y="41" text-anchor="middle" font-size="13" font-weight="700" fill="#5b6a96">03</text>
    <text x="261" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#293147">Thread</text>
    <text x="261" y="41" text-anchor="middle" font-size="13" font-weight="700" fill="#5b6a96">…</text>
  </g>

  <rect x="296" y="238" width="330" height="140" rx="16" fill="#ffffff" stroke="#293147" stroke-width="1.5"/>
  <text x="320" y="266" font-size="14" font-weight="700" fill="#293147">Worker machine N</text>
  <text x="600" y="266" text-anchor="end" font-size="11" font-weight="600" fill="#5b6a96">scale out</text>
  <g transform="translate(320 286)">
    <rect x="0" y="0" width="66" height="58" rx="8" fill="#eef1f6" stroke="#c3ccdf"/>
    <rect x="76" y="0" width="66" height="58" rx="8" fill="#eef1f6" stroke="#c3ccdf"/>
    <rect x="152" y="0" width="66" height="58" rx="8" fill="#eef1f6" stroke="#c3ccdf"/>
    <rect x="228" y="0" width="66" height="58" rx="8" fill="#eef1f6" stroke="#c3ccdf"/>
    <text x="33" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#293147">Thread</text>
    <text x="33" y="41" text-anchor="middle" font-size="13" font-weight="700" fill="#5b6a96">01</text>
    <text x="109" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#293147">Thread</text>
    <text x="109" y="41" text-anchor="middle" font-size="13" font-weight="700" fill="#5b6a96">02</text>
    <text x="185" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#293147">Thread</text>
    <text x="185" y="41" text-anchor="middle" font-size="13" font-weight="700" fill="#5b6a96">03</text>
    <text x="261" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#293147">Thread</text>
    <text x="261" y="41" text-anchor="middle" font-size="13" font-weight="700" fill="#5b6a96">…</text>
  </g>

  <path d="M237 221H266V133H284" fill="none" stroke="#5b6a96" stroke-width="2" marker-end="url(#parallel-arrow)"/>
  <path d="M266 221V308H284" fill="none" stroke="#5b6a96" stroke-width="2" marker-end="url(#parallel-arrow)"/>

  <!-- Judge fan-out -->
  <path d="M638 133H672V99H698" fill="none" stroke="#5b6a96" stroke-width="2" marker-end="url(#parallel-arrow)"/>
  <path d="M638 308H672V99" fill="none" stroke="#5b6a96" stroke-width="2"/>
  <rect x="712" y="58" width="210" height="278" rx="16" fill="#293147" stroke="#1b2236"/>
  <text x="817" y="88" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff">Judge fan-out</text>
  <text x="817" y="109" text-anchor="middle" font-size="11.5" fill="#c8d0e4">conversation × 4–5 judges</text>
  <g transform="translate(742 128)">
    <rect x="0" y="0" width="150" height="28" rx="7" fill="#ffffff"/>
    <rect x="0" y="37" width="150" height="28" rx="7" fill="#ffffff"/>
    <rect x="0" y="74" width="150" height="28" rx="7" fill="#ffffff"/>
    <rect x="0" y="111" width="150" height="28" rx="7" fill="#ffffff"/>
    <rect x="0" y="148" width="150" height="28" rx="7" fill="#c8d0e4"/>
    <text x="75" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#293147">Judge 1 · safety</text>
    <text x="75" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#293147">Judge 2 · accuracy</text>
    <text x="75" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="#293147">Judge 3 · grounding</text>
    <text x="75" y="129" text-anchor="middle" font-size="11" font-weight="700" fill="#293147">Judge 4 · relevance</text>
    <text x="75" y="166" text-anchor="middle" font-size="11" font-weight="700" fill="#293147">Judge 5 · optional</text>
  </g>
  <text x="817" y="324" text-anchor="middle" font-size="11" font-weight="600" fill="#c8d0e4">≤100 calls in flight</text>

  <line x1="934" y1="186" x2="974" y2="186" stroke="#5b6a96" stroke-width="2" marker-end="url(#parallel-arrow)"/>

  <!-- Assignment -->
  <rect x="990" y="118" width="100" height="136" rx="15" fill="#eef1f6" stroke="#293147" stroke-width="1.5"/>
  <circle cx="1040" cy="157" r="18" fill="#293147"/>
  <path d="M1030 157h20M1040 147v20" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <text x="1040" y="195" text-anchor="middle" font-size="12.5" font-weight="700" fill="#293147">Combine</text>
  <text x="1040" y="213" text-anchor="middle" font-size="12.5" font-weight="700" fill="#293147">and assign</text>
  <text x="1040" y="238" text-anchor="middle" font-size="10.5" fill="#5b6a96">3 outcomes</text>

  <rect x="296" y="410" width="626" height="34" rx="17" fill="#eef1f6" stroke="#c3ccdf"/>
  <text x="609" y="432" text-anchor="middle" font-size="12" font-weight="700" fill="#293147">Increase capacity with more threads/processes, more worker machines, or both</text>
</svg>
