<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 350" font-family="'DM Sans', system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-labelledby="runtime-title runtime-desc">
  <title id="runtime-title">Projected judge-stage wall-clock time</title>
  <desc id="runtime-desc">At one hundred concurrent calls, a 300 millisecond judge takes an estimated 70 to 88 minutes for four to five judges, with less than 4.4 minutes of targeted GGX overhead. A one second judge takes 233 to 292 minutes, with less than 14.6 minutes of targeted GGX overhead.</desc>
  <defs>
    <pattern id="runtime-overhead" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#eef1f6"/>
      <rect width="3" height="8" fill="#9aa6c0"/>
    </pattern>
  </defs>

  <rect width="960" height="350" rx="18" fill="#ffffff"/>
  <text x="480" y="31" text-anchor="middle" font-size="12" font-weight="700" letter-spacing="1.4" fill="#6b7280">MODELED WALL-CLOCK TIME · 100 CONCURRENT API CALLS</text>

  <!-- Legend -->
  <rect x="512" y="52" width="18" height="10" rx="2" fill="#293147"/>
  <text x="537" y="61" font-size="10.5" fill="#6b7280">4-judge workload</text>
  <rect x="636" y="52" width="18" height="10" rx="2" fill="#5b6a96"/>
  <text x="661" y="61" font-size="10.5" fill="#6b7280">additional time for 5 judges</text>
  <rect x="818" y="52" width="18" height="10" rx="2" fill="url(#runtime-overhead)" stroke="#9aa6c0" stroke-width="0.5"/>
  <text x="843" y="61" font-size="10.5" fill="#6b7280">GGX target</text>

  <!-- Axis -->
  <g font-size="10.5" fill="#6b7280" text-anchor="middle">
    <text x="200" y="315">0</text>
    <text x="331" y="315">60</text>
    <text x="463" y="315">120</text>
    <text x="594" y="315">180</text>
    <text x="725" y="315">240</text>
    <text x="856" y="315">300</text>
  </g>
  <text x="528" y="338" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">MINUTES</text>
  <g stroke="#e3e7ef" stroke-width="1">
    <line x1="200" y1="76" x2="200" y2="298"/>
    <line x1="331" y1="76" x2="331" y2="298"/>
    <line x1="463" y1="76" x2="463" y2="298"/>
    <line x1="594" y1="76" x2="594" y2="298"/>
    <line x1="725" y1="76" x2="725" y2="298"/>
    <line x1="856" y1="76" x2="856" y2="298"/>
  </g>

  <!-- 300ms row -->
  <text x="36" y="112" font-size="14" font-weight="700" fill="#293147">Lower complexity</text>
  <text x="36" y="132" font-size="11.5" fill="#6b7280">300 ms / judge call</text>
  <rect x="200" y="96" width="153" height="44" rx="7" fill="#293147"/>
  <rect x="353" y="96" width="39" height="44" rx="0" fill="#5b6a96"/>
  <rect x="392" y="96" width="10" height="44" rx="3" fill="url(#runtime-overhead)" stroke="#9aa6c0"/>
  <text x="276.5" y="122" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">70 min · 4 judges</text>
  <text x="412" y="111" font-size="10.5" font-weight="700" fill="#293147">88 min · 5 judges</text>
  <text x="412" y="132" font-size="10.5" fill="#6b7280">GGX target &lt;4.4 min</text>

  <!-- 1s row -->
  <text x="36" y="220" font-size="14" font-weight="700" fill="#293147">Higher complexity</text>
  <text x="36" y="240" font-size="11.5" fill="#6b7280">1 second / judge call</text>
  <rect x="200" y="204" width="510" height="44" rx="7" fill="#293147"/>
  <rect x="710" y="204" width="129" height="44" rx="0" fill="#5b6a96"/>
  <rect x="839" y="204" width="32" height="44" rx="3" fill="url(#runtime-overhead)" stroke="#9aa6c0"/>
  <text x="455" y="230" text-anchor="middle" font-size="11.5" font-weight="700" fill="#ffffff">233 min · 4 judges</text>
  <text x="774.5" y="230" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">292 min</text>
  <text x="882" y="219" font-size="10.5" font-weight="700" fill="#293147">5 judges</text>
  <text x="882" y="240" font-size="10.5" fill="#6b7280">GGX &lt;14.6 min</text>

  <text x="480" y="280" text-anchor="middle" font-size="12" font-weight="600" fill="#293147">Judge latency and available concurrency—not GGX orchestration—drive the projected duration.</text>
</svg>
