<svg viewBox="0 0 760 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Production monitoring funnel: high-volume live traces narrowed through heuristic pre-processing, LLM-aided judgment, and finally human review only when needed." font-family="'DM Sans', system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="ml" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="330" rx="16" fill="#ffffff"/>

  <text x="380" y="34" font-size="14" fill="#4b5563" text-anchor="middle" font-style="italic">High-volume production traces, narrowed to what truly needs review</text>

  <rect x="60" y="55" width="640" height="56" rx="10" fill="#ffffff" stroke="#6b7280" stroke-width="0.75"/>
  <text x="380" y="80" font-size="16" fill="#293147" text-anchor="middle" font-weight="600">Live production traces</text>
  <text x="380" y="99" font-size="13.5" fill="#4b5563" text-anchor="middle">Every customer interaction &#183; errors &#183; latency &#183; cost</text>

  <line x1="380" y1="116" x2="380" y2="130" stroke="#6b7280" stroke-width="1" marker-end="url(#ml)"/>

  <rect x="130" y="138" width="500" height="50" rx="10" fill="#eef1f6" stroke="#5b6a96" stroke-width="0.75"/>
  <text x="380" y="160" font-size="15" fill="#1b2236" font-weight="600" text-anchor="middle">Heuristic pre-processing</text>
  <text x="380" y="177" font-size="13" fill="#5b6a96" text-anchor="middle">Deduplication &#183; noise filtering &#183; diversity enforcement</text>

  <line x1="380" y1="193" x2="380" y2="207" stroke="#6b7280" stroke-width="1" marker-end="url(#ml)"/>

  <rect x="190" y="215" width="380" height="50" rx="10" fill="#eef1f6" stroke="#5b6a96" stroke-width="0.75"/>
  <text x="380" y="237" font-size="15" fill="#1b2236" font-weight="600" text-anchor="middle">LLM-aided judgment</text>
  <text x="380" y="254" font-size="13" fill="#5b6a96" text-anchor="middle">Answer relevancy &#183; toxic/jailbreak &#183; groundedness</text>

  <line x1="380" y1="270" x2="380" y2="284" stroke="#6b7280" stroke-width="1" marker-end="url(#ml)"/>

  <rect x="250" y="292" width="260" height="30" rx="8" fill="#293147" stroke="#1b2236" stroke-width="0.5"/>
  <text x="380" y="312" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="600">Human review, only when needed</text>
</svg>
