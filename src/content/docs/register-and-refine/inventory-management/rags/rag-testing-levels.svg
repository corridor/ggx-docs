<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" font-family="'DM Sans', system-ui, -apple-system, Segoe UI, sans-serif" role="img" aria-label="Three ways to test a RAG with increasing coverage: a Quick Test on a single query, a Bulk Simulation across an entire dataset of queries, and an end-to-end run inside a pipeline that uses the RAG.">
  <defs>
    <linearGradient id="prog-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dbe0ee"/>
      <stop offset="1" stop-color="#293147"/>
    </linearGradient>
    <marker id="ah-rt" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6a96"/>
    </marker>
  </defs>

  <!-- Card 1: Quick Test -->
  <rect x="20" y="24" width="280" height="200" rx="16" fill="#ffffff" stroke="#d7dcec"/>
  <circle cx="48" cy="52" r="15" fill="#293147"/>
  <text x="48" y="57" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">1</text>
  <text x="72" y="57" font-size="16" font-weight="700" fill="#293147">Quick Test</text>
  <rect x="116" y="86" width="88" height="30" rx="15" fill="#eef1f6" stroke="#5b6a96"/>
  <circle cx="134" cy="101" r="7" fill="none" stroke="#5b6a96" stroke-width="2.4"/>
  <line x1="139" y1="106" x2="146" y2="113" stroke="#5b6a96" stroke-width="2.4" stroke-linecap="round"/>
  <text x="158" y="105" font-size="12" fill="#6b7280">query…</text>
  <circle cx="182" cy="138" r="11" fill="#256b5e"/>
  <path d="M177 138l3.2 3.2 6-6.4" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="160" y="184" text-anchor="middle" font-size="12.5" fill="#6b7280">One query, while you</text>
  <text x="160" y="201" text-anchor="middle" font-size="12.5" fill="#6b7280">are writing the logic.</text>

  <!-- Card 2: Bulk Simulation -->
  <rect x="320" y="24" width="280" height="200" rx="16" fill="#ffffff" stroke="#d7dcec"/>
  <circle cx="348" cy="52" r="15" fill="#293147"/>
  <text x="348" y="57" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2</text>
  <text x="372" y="57" font-size="16" font-weight="700" fill="#293147">Bulk Simulation</text>
  <g>
    <rect x="416" y="90" width="16" height="16" rx="3" fill="#293147"/>
    <rect x="440" y="90" width="16" height="16" rx="3" fill="#c3cbe0"/>
    <rect x="464" y="90" width="16" height="16" rx="3" fill="#293147"/>
    <rect x="488" y="90" width="16" height="16" rx="3" fill="#c3cbe0"/>
    <rect x="416" y="114" width="16" height="16" rx="3" fill="#c3cbe0"/>
    <rect x="440" y="114" width="16" height="16" rx="3" fill="#293147"/>
    <rect x="464" y="114" width="16" height="16" rx="3" fill="#c3cbe0"/>
    <rect x="488" y="114" width="16" height="16" rx="3" fill="#293147"/>
    <rect x="416" y="138" width="16" height="16" rx="3" fill="#293147"/>
    <rect x="440" y="138" width="16" height="16" rx="3" fill="#c3cbe0"/>
    <rect x="464" y="138" width="16" height="16" rx="3" fill="#293147"/>
    <rect x="488" y="138" width="16" height="16" rx="3" fill="#c3cbe0"/>
  </g>
  <text x="460" y="184" text-anchor="middle" font-size="12.5" fill="#6b7280">Many queries, one set</text>
  <text x="460" y="201" text-anchor="middle" font-size="12.5" fill="#6b7280">of results per query.</text>

  <!-- Card 3: In a pipeline -->
  <rect x="620" y="24" width="280" height="200" rx="16" fill="#ffffff" stroke="#293147" stroke-width="1.5"/>
  <circle cx="648" cy="52" r="15" fill="#293147"/>
  <text x="648" y="57" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">3</text>
  <text x="672" y="57" font-size="16" font-weight="700" fill="#293147">In a Pipeline</text>
  <rect x="636" y="98" width="56" height="30" rx="8" fill="#eef1f6" stroke="#5b6a96"/>
  <text x="664" y="117" text-anchor="middle" font-size="12" font-weight="700" fill="#293147">RAG</text>
  <line x1="694" y1="113" x2="708" y2="113" stroke="#5b6a96" stroke-width="2" marker-end="url(#ah-rt)"/>
  <rect x="712" y="98" width="80" height="30" rx="8" fill="#293147"/>
  <text x="752" y="117" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Pipeline</text>
  <line x1="794" y1="113" x2="808" y2="113" stroke="#5b6a96" stroke-width="2" marker-end="url(#ah-rt)"/>
  <circle cx="828" cy="113" r="11" fill="#256b5e"/>
  <path d="M823 113l3.2 3.2 6-6.4" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="760" y="184" text-anchor="middle" font-size="12.5" fill="#6b7280">Inside a full pipeline,</text>
  <text x="760" y="201" text-anchor="middle" font-size="12.5" fill="#6b7280">against the final output.</text>

  <!-- progression bar -->
  <rect x="20" y="252" width="858" height="16" rx="8" fill="url(#prog-r)"/>
  <path d="M874 246 L900 260 L874 274 Z" fill="#293147"/>
  <text x="20" y="294" font-size="12" letter-spacing="1.2" font-weight="600" fill="#6b7280">INDEPENDENT&#160;&#160;&#8594;&#160;&#160;END-TO-END</text>
</svg>
