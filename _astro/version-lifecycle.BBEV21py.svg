<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 330" font-family="'DM Sans', system-ui, -apple-system, Segoe UI, sans-serif" role="img" aria-label="The version lifecycle: a Draft (Version 1) is edited — every save snapshotted — then sent for Approval and locked as an immutable Approved version. Cloning the approved version creates Draft Version 2, which repeats the same cycle. Changes to a draft propagate downstream immediately; approved versions stay in use until explicitly upgraded.">
  <defs>
    <marker id="ah-vl" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6a96"/>
    </marker>
  </defs>

  <text x="40" y="32" font-size="13" letter-spacing="1.4" font-weight="600" fill="#6b7280">THE VERSION LIFECYCLE</text>

  <!-- Draft v1 -->
  <rect x="40" y="62" width="190" height="74" rx="14" fill="#ffffff" stroke="#293147" stroke-width="1.5"/>
  <text x="135" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#293147">Draft &#183; Version 1</text>
  <text x="135" y="114" text-anchor="middle" font-size="11.5" fill="#6b7280">every save = a snapshot</text>

  <line x1="230" y1="99" x2="288" y2="99" stroke="#5b6a96" stroke-width="2" marker-end="url(#ah-vl)"/>

  <!-- Approval -->
  <rect x="292" y="62" width="150" height="74" rx="14" fill="#eef1f6" stroke="#5b6a96"/>
  <text x="367" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#2f3a57">Approval</text>
  <text x="367" y="114" text-anchor="middle" font-size="11.5" fill="#6b7280">review &amp; sign-off</text>

  <line x1="442" y1="99" x2="500" y2="99" stroke="#5b6a96" stroke-width="2" marker-end="url(#ah-vl)"/>

  <!-- Approved v1 -->
  <rect x="504" y="62" width="190" height="74" rx="14" fill="#293147"/>
  <path d="M669 80 v-2 a6 6 0 0 1 12 0 v2" fill="none" stroke="#aab4d0" stroke-width="2"/>
  <rect x="666" y="80" width="18" height="13" rx="2.5" fill="#cdd5ea"/>
  <text x="599" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Approved &#183; v1</text>
  <text x="599" y="117" text-anchor="middle" font-size="11.5" fill="#c8d0e4">locked &#183; immutable</text>

  <!-- Clone arrow down -->
  <line x1="599" y1="138" x2="599" y2="196" stroke="#5b6a96" stroke-width="2" marker-end="url(#ah-vl)"/>
  <text x="612" y="172" font-size="12" font-weight="700" fill="#2f3a57">Clone</text>

  <!-- Draft v2 -->
  <rect x="504" y="200" width="190" height="70" rx="14" fill="#ffffff" stroke="#293147" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="599" y="230" text-anchor="middle" font-size="15" font-weight="700" fill="#293147">Draft &#183; Version 2</text>
  <text x="599" y="251" text-anchor="middle" font-size="11.5" fill="#6b7280">a copy of v1 — same cycle</text>

  <!-- repeats loop back to approval -->
  <path d="M504 235 C 300 235, 300 235, 230 180 L 220 162" fill="none" stroke="#9aa6c0" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ah-vl)"/>
  <text x="300" y="252" font-size="11.5" fill="#6b7280">…repeats the cycle</text>

  <!-- downstream note -->
  <rect x="710" y="62" width="170" height="208" rx="14" fill="#fbfcfe" stroke="#d7dcec"/>
  <text x="726" y="88" font-size="11.5" letter-spacing="1" font-weight="600" fill="#6b7280">PROPAGATION</text>
  <text x="726" y="116" font-size="12" fill="#374151"><tspan font-weight="700">Draft edits</tspan></text>
  <text x="726" y="134" font-size="11.5" fill="#6b7280">flow downstream</text>
  <text x="726" y="150" font-size="11.5" fill="#6b7280">immediately.</text>
  <text x="726" y="182" font-size="12" fill="#374151"><tspan font-weight="700">Approved versions</tspan></text>
  <text x="726" y="200" font-size="11.5" fill="#6b7280">stay in use until a</text>
  <text x="726" y="216" font-size="11.5" fill="#6b7280">downstream object is</text>
  <text x="726" y="232" font-size="11.5" fill="#6b7280">explicitly upgraded.</text>
</svg>
