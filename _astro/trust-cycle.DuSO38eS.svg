<svg viewBox="0 0 700 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trust cycle: try the AI, experience its behavior, react with flags and ratings, retest the next version, and repeat until trust — with TRUST as the destination at the center. Each cycle builds confidence and every fix increases trust." font-family="'DM Sans', system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#FB923C" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="700" height="660" rx="16" fill="#ffffff"/>

  <!-- cycle arrows (clockwise) -->
  <g fill="none" stroke="#FB923C" stroke-width="2.4">
    <path d="M413.3 105.0 A205 205 0 0 1 515.8 179.5" marker-end="url(#arw)"/>
    <path d="M555.0 300.0 A205 205 0 0 1 515.8 420.5" marker-end="url(#arw)"/>
    <path d="M413.3 495.0 A205 205 0 0 1 286.7 495.0" marker-end="url(#arw)"/>
    <path d="M184.2 420.5 A205 205 0 0 1 145.0 300.0" marker-end="url(#arw)"/>
    <path d="M184.2 179.5 A205 205 0 0 1 286.7 105.0" marker-end="url(#arw)"/>
  </g>

  <!-- center: TRUST -->
  <circle cx="350" cy="300" r="78" fill="#FFF7ED" stroke="#F97316" stroke-opacity="0.28" stroke-width="1.5"/>
  <g transform="translate(350,266)">
    <path d="M0 -16 L13 -10 L13 1 C13 11 7 17 0 20 C-7 17 -13 11 -13 1 L-13 -10 Z" fill="none" stroke="#F97316" stroke-width="2.2" stroke-linejoin="round"/>
    <path d="M-5 0 L-1 4 L6 -5" fill="none" stroke="#F97316" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="350" y="312" text-anchor="middle" font-size="24" font-weight="700" letter-spacing="1" fill="#C54600">TRUST</text>
  <text x="350" y="332" text-anchor="middle" font-size="12.5" fill="#6b7280">the destination</text>

  <!-- node: Try (top) -->
  <g transform="translate(350,90)">
    <rect x="-26" y="-26" width="52" height="52" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-opacity="0.3" stroke-width="1.5"/>
    <path d="M-5 -8 L9 0 L-5 8 Z" fill="#C54600"/>
    <text x="0" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#293147">Try</text>
    <text x="0" y="63" text-anchor="middle" font-size="12" fill="#6b7280">Run the AI</text>
  </g>

  <!-- node: Experience (right) -->
  <g transform="translate(550,235)">
    <rect x="-26" y="-26" width="52" height="52" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-opacity="0.3" stroke-width="1.5"/>
    <g fill="none" stroke="#C54600" stroke-width="2">
      <path d="M-11 0 C-6 -7 6 -7 11 0 C6 7 -6 7 -11 0 Z"/>
      <circle cx="0" cy="0" r="3" fill="#C54600" stroke="none"/>
    </g>
    <text x="0" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#293147">Experience</text>
    <text x="0" y="63" text-anchor="middle" font-size="12" fill="#6b7280">See behavior</text>
  </g>

  <!-- node: React (bottom right) -->
  <g transform="translate(473,470)">
    <rect x="-26" y="-26" width="52" height="52" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-opacity="0.3" stroke-width="1.5"/>
    <path d="M-11 -8 h22 a3 3 0 0 1 3 3 v8 a3 3 0 0 1 -3 3 h-12 l-6 5 v-5 h-4 a3 3 0 0 1 -3 -3 v-8 a3 3 0 0 1 3 -3 z" fill="none" stroke="#C54600" stroke-width="2" stroke-linejoin="round"/>
    <text x="0" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#293147">React</text>
    <text x="0" y="63" text-anchor="middle" font-size="12" fill="#6b7280">Flag, rate</text>
  </g>

  <!-- node: Retest (bottom left) -->
  <g transform="translate(227,470)">
    <rect x="-26" y="-26" width="52" height="52" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-opacity="0.3" stroke-width="1.5"/>
    <g fill="none" stroke="#C54600" stroke-width="2">
      <rect x="-9" y="-10" width="18" height="22" rx="3"/>
      <rect x="-4" y="-13" width="8" height="5" rx="1.5" fill="#FFF7ED"/>
      <path d="M-5 1 L-1 5 L6 -3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="0" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#293147">Retest</text>
    <text x="0" y="63" text-anchor="middle" font-size="12" fill="#6b7280">Verify fixes</text>
  </g>

  <!-- node: Repeat (left) -->
  <g transform="translate(150,235)">
    <rect x="-26" y="-26" width="52" height="52" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-opacity="0.3" stroke-width="1.5"/>
    <g fill="none" stroke="#C54600" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 -4 A10 10 0 1 0 11 5"/>
      <path d="M10 -10 L10 -4 L4 -4"/>
    </g>
    <text x="0" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#293147">Repeat</text>
    <text x="0" y="63" text-anchor="middle" font-size="12" fill="#6b7280">Until trust</text>
  </g>

  <!-- caption -->
  <rect x="168" y="608" width="364" height="32" rx="16" fill="#FFF7ED" stroke="#F97316" stroke-opacity="0.25" stroke-width="1"/>
  <text x="350" y="628" text-anchor="middle" font-size="12" font-weight="600" fill="#C54600">Each cycle builds confidence. Every fix increases trust.</text>
</svg>
