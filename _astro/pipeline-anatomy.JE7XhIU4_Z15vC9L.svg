<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" font-family="'DM Sans', system-ui, -apple-system, Segoe UI, sans-serif" role="img" aria-label="Pipeline anatomy: inputs flow into scoring logic, which draws on registered resources, and returns an output.">
  <defs>
    <marker id="ah2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6a96"/>
    </marker>
  </defs>

  <text x="450" y="34" text-anchor="middle" font-size="13" letter-spacing="1.5" font-weight="600" fill="#6b7280">EVERY PIPELINE HAS THE SAME THREE-PART SHAPE</text>

  <!-- input -->
  <rect x="24" y="140" width="156" height="68" rx="16" fill="#eef1f6" stroke="#d7dcec"/>
  <text x="102" y="170" text-anchor="middle" font-size="15" font-weight="700" fill="#293147">Input</text>
  <text x="102" y="190" text-anchor="middle" font-size="12" fill="#6b7280">request / message</text>
  <line x1="182" y1="174" x2="294" y2="174" stroke="#5b6a96" stroke-width="2" marker-end="url(#ah2)"/>

  <!-- scoring logic -->
  <rect x="298" y="96" width="304" height="156" rx="16" fill="#ffffff" stroke="#293147" stroke-width="1.5"/>
  <rect x="298" y="96" width="304" height="40" rx="16" fill="#293147"/>
  <rect x="298" y="120" width="304" height="16" fill="#293147"/>
  <text x="450" y="122" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Scoring Logic</text>
  <text x="450" y="170" text-anchor="middle" font-size="13" fill="#374151">The orchestration code that wires</text>
  <text x="450" y="190" text-anchor="middle" font-size="13" fill="#374151">resources together to generate</text>
  <text x="450" y="210" text-anchor="middle" font-size="13" fill="#374151">or predict a result.</text>

  <line x1="604" y1="174" x2="716" y2="174" stroke="#5b6a96" stroke-width="2" marker-end="url(#ah2)"/>

  <!-- output -->
  <rect x="720" y="140" width="156" height="68" rx="16" fill="#293147"/>
  <text x="798" y="170" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Output</text>
  <text x="798" y="190" text-anchor="middle" font-size="12" fill="#c8d0e4">generated result</text>

  <!-- resources feeding up -->
  <rect x="298" y="288" width="304" height="50" rx="12" fill="#eef1f6" stroke="#d7dcec"/>
  <text x="450" y="309" text-anchor="middle" font-size="13" font-weight="700" fill="#2f3a57">Registered Resources</text>
  <text x="450" y="327" text-anchor="middle" font-size="12" fill="#6b7280">Models · RAGs · Prompts · Guardrails · Sub-pipelines</text>
  <line x1="450" y1="286" x2="450" y2="256" stroke="#5b6a96" stroke-width="2" marker-end="url(#ah2)"/>
</svg>
