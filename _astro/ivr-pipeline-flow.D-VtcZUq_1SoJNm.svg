<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 270" font-family="'DM Sans', system-ui, -apple-system, Segoe UI, sans-serif" role="img" aria-label="IVR pipeline: a caller message flows through Intent Classification then Response Generation to produce a spoken reply.">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6a96"/>
    </marker>
  </defs>

  <text x="490" y="34" text-anchor="middle" font-size="13" letter-spacing="1.5" font-weight="600" fill="#6b7280">TWO SUB-PIPELINES ORCHESTRATED IN SEQUENCE</text>

  <!-- input -->
  <rect x="20" y="98" width="150" height="74" rx="16" fill="#eef1f6" stroke="#d7dcec"/>
  <circle cx="57" cy="135" r="15" fill="#293147"/>
  <path d="M51 129a3 3 0 0 1 3-3h2l2 5-2 2a12 12 0 0 0 5 5l2-2 5 2v2a3 3 0 0 1-3 3 16 16 0 0 1-16-16z" fill="#fff"/>
  <text x="84" y="131" font-size="14" font-weight="600" fill="#293147">Caller</text>
  <text x="84" y="149" font-size="14" font-weight="600" fill="#293147">message</text>
  <line x1="172" y1="135" x2="204" y2="135" stroke="#5b6a96" stroke-width="2" marker-end="url(#ah)"/>

  <!-- card 1 -->
  <rect x="208" y="64" width="222" height="142" rx="14" fill="#ffffff" stroke="#d7dcec"/>
  <rect x="208" y="64" width="222" height="34" rx="14" fill="#293147"/>
  <rect x="208" y="84" width="222" height="14" fill="#293147"/>
  <text x="228" y="86" font-size="15" font-weight="700" fill="#ffffff">1 · Intent Classification</text>
  <text x="228" y="128" font-size="13" fill="#374151">Reads what the caller said</text>
  <text x="228" y="148" font-size="13" fill="#374151">and labels their intent.</text>
  <rect x="228" y="166" width="84" height="24" rx="12" fill="#eef1f6"/>
  <text x="270" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#2f3a57">LLM</text>
  <rect x="320" y="166" width="92" height="24" rx="12" fill="#eef1f6"/>
  <text x="366" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#2f3a57">Prompt</text>
  <line x1="432" y1="135" x2="466" y2="135" stroke="#5b6a96" stroke-width="2" marker-end="url(#ah)"/>

  <!-- card 2 -->
  <rect x="470" y="64" width="290" height="142" rx="14" fill="#ffffff" stroke="#d7dcec"/>
  <rect x="470" y="64" width="290" height="34" rx="14" fill="#293147"/>
  <rect x="470" y="84" width="290" height="14" fill="#293147"/>
  <text x="490" y="86" font-size="15" font-weight="700" fill="#ffffff">2 · Response Generation</text>
  <text x="490" y="128" font-size="13" fill="#374151">Uses the detected intent and live</text>
  <text x="490" y="148" font-size="13" fill="#374151">customer data to craft the reply.</text>
  <rect x="490" y="166" width="84" height="24" rx="12" fill="#eef1f6"/>
  <text x="532" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#2f3a57">LLM</text>
  <rect x="582" y="166" width="92" height="24" rx="12" fill="#eef1f6"/>
  <text x="628" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#2f3a57">Prompt</text>
  <rect x="682" y="166" width="62" height="24" rx="12" fill="#dfeae6"/>
  <text x="713" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#256b5e">RAG</text>
  <line x1="762" y1="135" x2="794" y2="135" stroke="#5b6a96" stroke-width="2" marker-end="url(#ah)"/>

  <!-- output -->
  <rect x="798" y="98" width="162" height="74" rx="16" fill="#293147"/>
  <circle cx="835" cy="135" r="15" fill="#ffffff"/>
  <path d="M829 130h12v8h-7l-3 3v-3h-2z" fill="#293147"/>
  <text x="862" y="131" font-size="14" font-weight="600" fill="#ffffff">Spoken</text>
  <text x="862" y="149" font-size="14" font-weight="600" fill="#ffffff">reply</text>
</svg>
